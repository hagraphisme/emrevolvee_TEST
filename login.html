<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | EMREVOLVEE Admin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- BcryptJS Library for Client-side Hashing -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <!-- Blurred Background underlay -->
    <div class="desktop-bg-blur" style="background-image: url('photo.png');"></div>

    <!-- Centered Form Container -->
    <div class="login-container">
        
        <div class="login-card">
            
            <header class="login-header">
                <a href="index.html" class="back-home-btn" title="Retour au site public">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div class="login-logo-icon">
                    <i data-lucide="lock"></i>
                </div>
                <h1 class="login-title">Console Admin</h1>
                <p class="login-subtitle">Connectez-vous pour modifier votre profil</p>
            </header>

            <form class="login-form" id="login-form">
                
                <!-- Email field -->
                <div class="form-group">
                    <label for="email" class="form-label">Adresse Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" class="form-input" placeholder="admin@test.com" required autocomplete="username">
                    </div>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" class="input-icon"></i>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <!-- Error Message Alert -->
                <div class="login-error-alert" id="error-alert" style="display: none;">
                    <i data-lucide="alert-circle" class="error-alert-icon"></i>
                    <span id="error-message">Identifiants incorrects.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="login-submit-btn">
                    <span>Se connecter</span>
                    <i data-lucide="log-in"></i>
                </button>

            </form>
            
        </div>
        
    </div>

    <!-- Custom Script for authentication -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialiser les icônes Lucide
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            const loginForm = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');

            // S'assurer que les identifiants par défaut sont initialisés et hachés avec bcryptjs
            if (!localStorage.getItem('emrevolvee_admin_email')) {
                localStorage.setItem('emrevolvee_admin_email', 'admin@test.com');
            }
            let storedPassword = localStorage.getItem('emrevolvee_admin_password') || 'admin123';
            // Si le mot de passe stocké n'est pas encore haché (format bcrypt)
            if (!storedPassword.startsWith('$2a$') && !storedPassword.startsWith('$2b$')) {
                const salt = dcodeIO.bcrypt.genSaltSync(10);
                storedPassword = dcodeIO.bcrypt.hashSync(storedPassword, salt);
                localStorage.setItem('emrevolvee_admin_password', storedPassword);
            }

            // Redirection si déjà connecté
            if (localStorage.getItem('emrevolvee_logged_in') === 'true') {
                window.location.href = 'dashboard.html';
            }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Lire les identifiants stockés
                const storedEmail = localStorage.getItem('emrevolvee_admin_email');
                const storedPass = localStorage.getItem('emrevolvee_admin_password');

                // Comparaison robuste avec bcryptjs
                let isPasswordValid = false;
                try {
                    isPasswordValid = dcodeIO.bcrypt.compareSync(password, storedPass);
                } catch(err) {
                    console.error("Erreur de comparaison bcrypt :", err);
                }

                if (email === storedEmail && isPasswordValid) {
                    // Session locale de connexion
                    localStorage.setItem('emrevolvee_logged_in', 'true');
                    errorAlert.style.display = 'none';
                    
                    // Redirection vers le dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Affichage de l'erreur
                    errorMessage.textContent = "Email ou mot de passe incorrect.";
                    errorAlert.style.display = 'flex';
                    
                    // Vider le champ de mot de passe
                    passwordInput.value = '';
                }
            });
        });
    </script>
</body>
</html>
