<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | EMREVOLVEE Admin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <!-- Blurred Background underlay -->
    <div class="desktop-bg-blur" style="background-image: url('photo.png');"></div>

    <!-- Centered Form Container -->
    <div class="login-container">
        
        <div class="login-card">
            
            <header class="login-header">
                <a href="index.html" class="back-home-btn" title="Retour au site public">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div class="login-logo-icon">
                    <i data-lucide="lock"></i>
                </div>
                <h1 class="login-title">Console Admin</h1>
                <p class="login-subtitle">Connectez-vous pour modifier votre profil</p>
            </header>

            <form class="login-form" id="login-form">
                
                <!-- Email field -->
                <div class="form-group">
                    <label for="email" class="form-label">Adresse Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" class="form-input" placeholder="contact@domaine.com" required autocomplete="username">
                    </div>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" class="input-icon"></i>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <!-- Error Message Alert -->
                <div class="login-error-alert" id="error-alert" style="display: none;">
                    <i data-lucide="alert-circle" class="error-alert-icon"></i>
                    <span id="error-message">Identifiants incorrects.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="login-submit-btn">
                    <span>Se connecter</span>
                    <i data-lucide="log-in"></i>
                </button>

            </form>
            
        </div>
        
    </div>

    <!-- Custom Script for authentication -->
    <script>
        const STRAPI_URL = "http://localhost:1337";

        document.addEventListener('DOMContentLoaded', () => {
            // Initialiser les icônes Lucide
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            const loginForm = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');

            // Redirection si déjà connecté (on vérifie d'abord si le token est valide via un fetch rapide à Strapi)
            const token = localStorage.getItem('token');
            if (token) {
                fetch(`${STRAPI_URL}/api/users/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(res => {
                    if (res.ok) {
                        window.location.href = 'dashboard.html';
                    } else if (res.status === 401) {
                        // Token invalide ou expiré -> nettoyage obligatoire
                        localStorage.removeItem('token');
                    }
                })
                .catch(err => {
                    console.error("Erreur de connexion Strapi lors de la vérification de session :", err);
                    // En cas d'erreur de connexion réseau pure, on ne supprime pas le token
                    // mais on ne redirige pas pour casser la boucle de clignotement.
                });
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Désactiver le bouton de soumission pendant le chargement
                const submitBtn = loginForm.querySelector('.login-submit-btn');
                const originalBtnContent = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span>Connexion...</span><i data-lucide="loader" class="spinner tiny-loader"></i>';
                if (typeof lucide !== 'undefined') lucide.createIcons();

                try {
                    const response = await fetch(`${STRAPI_URL}/api/auth/local`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            identifier: email,
                            password: password
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.jwt) {
                          // Enregistrer le token JWT dans localStorage
                          localStorage.setItem('token', data.jwt);
                          localStorage.setItem('emrevolvee_logged_in', 'true');
                          errorAlert.style.display = 'none';
                          
                          // Redirection vers le dashboard
                          window.location.href = 'dashboard.html';
                    } else {
                        // Affichage de l'erreur Strapi ou message par défaut
                        errorMessage.textContent = data.error?.message || "Email ou mot de passe incorrect.";
                        errorAlert.style.display = 'flex';
                        passwordInput.value = '';
                    }
                } catch (err) {
                    console.error("Erreur d'authentification Strapi :", err);
                    errorMessage.textContent = "Impossible de se connecter au serveur Strapi.";
                    errorAlert.style.display = 'flex';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnContent;
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }
            });
        });
    </script>
</body>
</html>
